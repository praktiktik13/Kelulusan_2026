    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {

      content: '✦';

      color: rgba(212,175,55,0.4);

    .islamic-border::before { left: 0; top: 50%; transform: translateY(-50%); }
